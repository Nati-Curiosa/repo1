name: Daily Site Health Check

on:
  schedule:
    # Runs every day at 9:00 AM UTC (12:00 PM Lisbon time)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  check-site:
    runs-on: ubuntu-latest

    steps:
      - name: Check if site is accessible
        run: |
          echo "Checking https://sourcing.sevista.store..."

          # Try to fetch the site with a 10 second timeout
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://sourcing.sevista.store)

          if [ "$response" = "200" ]; then
            echo "✅ Site is UP! (HTTP $response)"
          else
            echo "❌ Site is DOWN or returning error! (HTTP $response)"
            exit 1
          fi

      - name: Check Calendly integration
        run: |
          echo "Checking if Calendly booking works..."

          page_content=$(curl -s --max-time 10 https://sourcing.sevista.store)

          if echo "$page_content" | grep -q "calendly.com/natalia-k-sevista"; then
            echo "✅ Calendly integration found"
          else
            echo "❌ Calendly link NOT found - booking may be broken"
            exit 1
          fi

      - name: Check Google Form integration
        run: |
          echo "Checking if contact form works..."

          page_content=$(curl -s --max-time 10 https://sourcing.sevista.store)

          if echo "$page_content" | grep -q "docs.google.com/forms"; then
            echo "✅ Google Form found"
          else
            echo "❌ Google Form NOT found - contact form may be broken"
            exit 1
          fi

      - name: Report success
        if: success()
        run: |
          echo "================================================"
          echo "✅ All checks passed!"
          echo "Site: https://sourcing.sevista.store"
          echo "Status: Healthy"
          echo "  - Site is accessible"
          echo "  - Calendly booking works"
          echo "  - Contact form works"
          echo "Time: $(date -u)"
          echo "================================================"
