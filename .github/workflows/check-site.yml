name: Daily Site Health Check

on:
  schedule:
    # Runs every day at 9:00 AM UTC (12:00 PM Lisbon time)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  check-site:
    runs-on: ubuntu-latest

    steps:
      - name: Check if site is accessible
        run: |
          echo "Checking https://sourcing.sevista.store..."

          # Check if site returns HTTP 200
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://sourcing.sevista.store)

          if [ "$response" = "200" ]; then
            echo "✅ Site is UP! (HTTP $response)"
          else
            echo "❌ Site is DOWN or returning error! (HTTP $response)"
            exit 1
          fi

      - name: Check if JavaScript bundle loads
        run: |
          echo "Checking if React app loads..."

          page_content=$(curl -s --max-time 10 https://sourcing.sevista.store)

          # Check if the React bundle is referenced
          if echo "$page_content" | grep -q "/assets/index-.*\.js"; then
            echo "✅ React bundle found in HTML"
          else
            echo "❌ React bundle NOT found - app may not load"
            exit 1
          fi

      - name: Check critical assets
        run: |
          echo "Checking if site has expected structure..."

          page_content=$(curl -s --max-time 10 https://sourcing.sevista.store)

          # Check for root div (React mount point)
          if echo "$page_content" | grep -q 'id="root"'; then
            echo "✅ React root element found"
          else
            echo "❌ React root NOT found"
            exit 1
          fi

          # Check for title
          if echo "$page_content" | grep -iq "Natalia Korelina"; then
            echo "✅ Page title found"
          else
            echo "❌ Page title NOT found"
            exit 1
          fi

      - name: Report success
        if: success()
        run: |
          echo "================================================"
          echo "✅ All checks passed!"
          echo "Site: https://sourcing.sevista.store"
          echo "Status: Healthy"
          echo "  - Site is accessible (HTTP 200)"
          echo "  - React app structure is intact"
          echo "  - JavaScript bundle loads"
          echo "Time: $(date -u)"
          echo "================================================"
