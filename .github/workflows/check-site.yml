name: Daily Site Health Check

on:
  schedule:
    # Runs every day at 9:00 AM UTC (12:00 PM Lisbon time)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  check-site:
    runs-on: ubuntu-latest

    steps:
      - name: Check if site is accessible
        run: |
          echo "Checking https://sourcing.sevista.store..."

          # Try to fetch the site with a 10 second timeout
          response=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://sourcing.sevista.store)

          if [ "$response" = "200" ]; then
            echo "✅ Site is UP! (HTTP $response)"
          else
            echo "❌ Site is DOWN or returning error! (HTTP $response)"
            exit 1
          fi

      - name: Check for critical content
        run: |
          echo "Checking if site contains expected content..."

          # Download the page
          page_content=$(curl -s --max-time 10 https://sourcing.sevista.store)

          # Check for key content that should be on the page
          if echo "$page_content" | grep -iq "Natalia Korelina"; then
            echo "✅ Main heading found"
          else
            echo "❌ Main heading NOT found - page may be broken"
            exit 1
          fi

          if echo "$page_content" | grep -q "Sustainable Sourcing"; then
            echo "✅ Tagline found"
          else
            echo "❌ Tagline NOT found - page may be broken"
            exit 1
          fi

          echo "✅ Site content looks good!"

      - name: Check Calendly integration
        run: |
          echo "Checking if Calendly is properly integrated..."

          page_content=$(curl -s --max-time 10 https://sourcing.sevista.store)

          if echo "$page_content" | grep -q "calendly.com/natalia-k-sevista"; then
            echo "✅ Calendly integration found"
          else
            echo "⚠️ Calendly URL not found in page source"
          fi

      - name: Report success
        if: success()
        run: |
          echo "================================================"
          echo "✅ All checks passed!"
          echo "Site: https://sourcing.sevista.store"
          echo "Status: Healthy"
          echo "Time: $(date -u)"
          echo "================================================"
